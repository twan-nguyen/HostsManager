<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Hosven app icon
       Concept: 3 cascading profile cards (Release / Production / Master)
       Background: dark indigo squircle (Apple HIG macOS proportions)
       Cards: purple / mint / amber gradients matching DesignSystem ProfileColor tokens -->

  <defs>
    <!-- Squircle background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3850"/>
      <stop offset="1" stop-color="#1f1d2e"/>
    </linearGradient>

    <!-- Card gradients -->
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9189e8"/>
      <stop offset="1" stop-color="#6c64c8"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7adcb8"/>
      <stop offset="1" stop-color="#4ab590"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7b94a"/>
      <stop offset="1" stop-color="#d4901a"/>
    </linearGradient>

    <!-- Soft drop shadow for cards -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle inner highlight on squircle top edge -->
    <linearGradient id="topShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Squircle clip -->
    <clipPath id="squircleClip">
      <rect x="100" y="100" width="824" height="824" rx="185" ry="185"/>
    </clipPath>
  </defs>

  <!-- Squircle base -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bgGrad)"/>

  <!-- Inner stroke (subtle rim) -->
  <rect x="100.5" y="100.5" width="823" height="823" rx="184.5" ry="184.5"
        fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Top shine -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#topShine)"/>

  <!-- Cards (clipped inside squircle) -->
  <g clip-path="url(#squircleClip)">

    <!-- Bottom card: amber, tilted -8° -->
    <g transform="translate(512 700) rotate(-8)" filter="url(#cardShadow)">
      <rect x="-260" y="-65" width="520" height="130" rx="26" fill="url(#amberGrad)"/>
      <!-- avatar dot -->
      <circle cx="-205" cy="0" r="32" fill="#ffffff" fill-opacity="0.95"/>
      <rect x="-216" y="-12" width="22" height="3" rx="1.5" fill="#d4901a" fill-opacity="0.85"/>
      <rect x="-216" y="-4"  width="14" height="3" rx="1.5" fill="#d4901a" fill-opacity="0.85"/>
      <rect x="-216" y="4"   width="18" height="3" rx="1.5" fill="#d4901a" fill-opacity="0.85"/>
      <!-- text bars -->
      <rect x="-150" y="-22" width="180" height="10" rx="5" fill="#ffffff" fill-opacity="0.9"/>
      <rect x="-150" y="-4"  width="240" height="8"  rx="4" fill="#ffffff" fill-opacity="0.55"/>
      <rect x="-150" y="12"  width="120" height="8"  rx="4" fill="#ffffff" fill-opacity="0.55"/>
    </g>

    <!-- Middle card: green, horizontal -->
    <g transform="translate(512 512)" filter="url(#cardShadow)">
      <rect x="-260" y="-65" width="520" height="130" rx="26" fill="url(#greenGrad)"/>
      <circle cx="-205" cy="0" r="32" fill="#ffffff" fill-opacity="0.95"/>
      <rect x="-216" y="-12" width="22" height="3" rx="1.5" fill="#4ab590" fill-opacity="0.85"/>
      <rect x="-216" y="-4"  width="14" height="3" rx="1.5" fill="#4ab590" fill-opacity="0.85"/>
      <rect x="-216" y="4"   width="18" height="3" rx="1.5" fill="#4ab590" fill-opacity="0.85"/>
      <rect x="-150" y="-22" width="200" height="10" rx="5" fill="#ffffff" fill-opacity="0.9"/>
      <rect x="-150" y="-4"  width="220" height="8"  rx="4" fill="#ffffff" fill-opacity="0.55"/>
      <rect x="-150" y="12"  width="140" height="8"  rx="4" fill="#ffffff" fill-opacity="0.55"/>
    </g>

    <!-- Top card: purple (active profile), tilted +8°, with check badge.
         Card narrowed to 480px so the right-edge check badge stays inside the squircle
         after rotation. -->
    <g transform="translate(512 324) rotate(8)" filter="url(#cardShadow)">
      <rect x="-240" y="-65" width="480" height="130" rx="26" fill="url(#purpleGrad)"/>
      <circle cx="-185" cy="0" r="32" fill="#ffffff" fill-opacity="0.95"/>
      <rect x="-196" y="-12" width="22" height="3" rx="1.5" fill="#6c64c8" fill-opacity="0.85"/>
      <rect x="-196" y="-4"  width="14" height="3" rx="1.5" fill="#6c64c8" fill-opacity="0.85"/>
      <rect x="-196" y="4"   width="18" height="3" rx="1.5" fill="#6c64c8" fill-opacity="0.85"/>
      <rect x="-130" y="-22" width="200" height="10" rx="5" fill="#ffffff" fill-opacity="0.95"/>
      <rect x="-130" y="-4"  width="160" height="8"  rx="4" fill="#ffffff" fill-opacity="0.55"/>
      <rect x="-130" y="12"  width="90"  height="8"  rx="4" fill="#ffffff" fill-opacity="0.55"/>
      <!-- check badge on right -->
      <circle cx="195" cy="0" r="30" fill="#ffffff"/>
      <path d="M 181 0 L 192 11 L 210 -9"
            fill="none" stroke="#5dcaa5" stroke-width="5.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
