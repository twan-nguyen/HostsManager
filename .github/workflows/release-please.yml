name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # PAT required so the tag push triggers the downstream build workflow.
          # GITHUB_TOKEN works for creating PRs/tags but events it emits do not
          # trigger other workflows (GitHub recursion guard). Falls back to
          # GITHUB_TOKEN if RELEASE_PLEASE_TOKEN secret is missing.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
