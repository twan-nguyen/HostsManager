name: Build & Release

on:
  push:
    tags:
      - 'v*'
  # Manual escape hatch: lets us rebuild an existing tag (e.g. when an earlier
  # tag push was suppressed by GitHub's recursion guard).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.7)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    env:
      # Unified ref — either the tag that pushed, or the dispatch input.
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Universal Binary
        run: |
          xcodebuild -project Hosven.xcodeproj \
            -scheme Hosven \
            -configuration Release \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            build

      - name: Package ZIP
        run: |
          cd build/Build/Products/Release
          zip -r Hosven-${{ env.TAG }}.zip Hosven.app

      - name: Calculate SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 build/Build/Products/Release/Hosven-${{ env.TAG }}.zip | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Create DMG
        run: |
          hdiutil create -volname "Hosven" \
            -srcfolder build/Build/Products/Release/Hosven.app \
            -ov -format UDZO \
            build/Hosven-${{ env.TAG }}.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ env.TAG }}
          files: |
            build/Build/Products/Release/Hosven-${{ env.TAG }}.zip
            build/Hosven-${{ env.TAG }}.dmg
          body: |
            ## Hosven ${{ env.TAG }}

            ### SHA256
            - ZIP: `${{ steps.sha.outputs.sha256 }}`

            ### Cài đặt
            ```bash
            brew install twan-nguyen/hosven/hosven
            ```

            ### Cập nhật
            App tự kiểm tra cập nhật qua Sparkle. Lần đầu cài qua Homebrew, sau đó update in-app.

            Hoặc tải file ZIP/DMG bên dưới.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::warning::SPARKLE_PRIVATE_KEY not set, skipping appcast generation"
            exit 0
          fi
          curl -fsSL -o /tmp/sparkle.tar.xz \
            https://github.com/sparkle-project/Sparkle/releases/download/2.7.0/Sparkle-2.7.0.tar.xz
          mkdir -p /tmp/sparkle && tar -xJf /tmp/sparkle.tar.xz -C /tmp/sparkle

          mkdir -p release-staging
          cp build/Build/Products/Release/Hosven-${{ env.TAG }}.zip release-staging/
          # Start fresh each release. Old appcast on gh-pages may contain stale
          # unsigned entries (from prior broken runs) that generate_appcast
          # would "update" rather than re-sign — leaving signatures empty.

          # Use stdin per Sparkle docs (recommended over key file for CI).
          # Strip any whitespace GitHub Actions may inject around the secret.
          printf '%s' "$SPARKLE_PRIVATE_KEY" | tr -d '\r\n\t ' | \
            /tmp/sparkle/bin/generate_appcast \
              --ed-key-file - \
              --download-url-prefix "https://github.com/twan-nguyen/hosven/releases/download/${{ env.TAG }}/" \
              release-staging/

          echo "--- appcast.xml ---"
          cat release-staging/appcast.xml

      - name: Publish appcast to gh-pages
        if: env.SPARKLE_PRIVATE_KEY != ''
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./release-staging
          keep_files: true
          exclude_assets: '*.zip,*.dmg'
          commit_message: "chore: publish appcast for ${{ env.TAG }}"

      - name: Update Homebrew Tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          VERSION="${{ env.TAG }}"
          VERSION_CLEAN="${VERSION#v}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          if [ -z "$TAP_REPO_TOKEN" ]; then
            echo "::warning::TAP_REPO_TOKEN not set, skipping Homebrew tap update"
            exit 0
          fi

          rm -rf /tmp/homebrew-tap
          git clone https://x-access-token:${TAP_REPO_TOKEN}@github.com/twan-nguyen/homebrew-hosven.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i '' "s/version \".*\"/version \"${VERSION_CLEAN}\"/" Casks/hosven.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/hosven.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/hosven.rb
          git commit -m "chore: update hosven to v${VERSION_CLEAN}"
          git push origin main

          echo "✓ Homebrew tap updated to v${VERSION_CLEAN}"
