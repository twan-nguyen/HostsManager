name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ZIP asset
        run: |
          TAG="${{ github.event.release.tag_name }}"
          curl -L -o HostsManager.zip \
            "https://github.com/${{ github.repository }}/releases/download/${TAG}/HostsManager-${TAG}.zip"

      - name: Calculate SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 HostsManager.zip | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Dispatch to Homebrew tap repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_REPO_TOKEN }}
          repository: twannguyenba-hash/homebrew-hostsmanager
          event-type: update-cask
          client-payload: |
            {
              "version": "${{ github.event.release.tag_name }}",
              "sha256": "${{ steps.sha.outputs.sha256 }}"
            }
