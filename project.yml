name: Devly
options:
  bundleIdPrefix: com.devly
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "15.0"
settings:
  base:
    MARKETING_VERSION: "2.2.1"
    CURRENT_PROJECT_VERSION: "3"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    SWIFT_VERSION: "5.9"
targets:
  Devly:
    type: application
    platform: macOS
    sources:
      - Devly
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_CFBundleDisplayName: Devly
        CODE_SIGN_ENTITLEMENTS: Devly/Devly.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.devly.app
        SWIFT_OBJC_BRIDGING_HEADER: Devly/Devly-Bridging-Header.h
    dependencies:
      - sdk: Security.framework
  DevlyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Devly
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.devly.app.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Devly.app/Contents/MacOS/Devly"
  DevlyUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - UITests
    dependencies:
      - target: Devly
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.devly.app.uitests
        TEST_TARGET_NAME: Devly
schemes:
  Devly:
    build:
      targets:
        Devly: all
        DevlyTests: [test]
        DevlyUITests: [test]
    test:
      targets:
        - DevlyTests
        - DevlyUITests
      gatherCoverageData: true
