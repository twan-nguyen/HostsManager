name: Hosven
options:
  bundleIdPrefix: com.twannguyen
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "15.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.7.0
settings:
  base:
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "1"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    SWIFT_VERSION: "5.9"
targets:
  Hosven:
    type: application
    platform: macOS
    sources:
      - Hosven
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_CFBundleDisplayName: Hosven
        INFOPLIST_KEY_SUFeedURL: https://twan-nguyen.github.io/hosven/appcast.xml
        INFOPLIST_KEY_SUPublicEDKey: +Zr28RWwnEsDnMCS7kkbbyd2lg7iCvYgmdUt6VNBTrY=
        INFOPLIST_KEY_SUEnableAutomaticChecks: YES
        INFOPLIST_KEY_SUScheduledCheckInterval: 86400
        CODE_SIGN_ENTITLEMENTS: Hosven/Hosven.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.twannguyen.hosven
        SWIFT_OBJC_BRIDGING_HEADER: Hosven/Hosven-Bridging-Header.h
    dependencies:
      - sdk: Security.framework
      - package: Sparkle
  HosvenTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Hosven
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.twannguyen.hosven.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Hosven.app/Contents/MacOS/Hosven"
  HosvenUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - UITests
    dependencies:
      - target: Hosven
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.twannguyen.hosven.uitests
        TEST_TARGET_NAME: Hosven
schemes:
  Hosven:
    build:
      targets:
        Hosven: all
        HosvenTests: [test]
        HosvenUITests: [test]
    test:
      targets:
        - HosvenTests
        - HosvenUITests
      gatherCoverageData: true
